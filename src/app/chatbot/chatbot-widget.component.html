<ng-container *ngIf="open; else launcher">
  <div class="panel">
    <!-- header -->
    <div class="hdr">
      <div class="hdr-left">
        <button class="back-btn" title="Back">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
            <path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z" />
          </svg>
        </button>
        <img
          src="https://cdn-icons-png.flaticon.com/512/13330/13330989.png"
          alt="Chatbot"
          class="chatbot-img"
        />
        <strong>{{ botName }}</strong>
      </div>
      <button class="x" (click)="open = false" title="Close">✕</button>
    </div>

    <!-- body -->
    <div class="body" #chatBody>
      <div
        *ngFor="let b of messages; let i = index"
        class="bubble"
        [class.you]="b.from === 'you'"
        [class.bot]="b.from === 'bot'"
      >
        <div *ngIf="b.text">{{ b.text }}</div>
        <img *ngIf="b.image" [src]="b.image" class="chat-image" alt="Shared image" />

        
        <!-- image response -->
        <div *ngIf="b.product" class="product-table">
          <table>
            <tr *ngFor="let field of getAllFields(b.product)">
              <td>
                <strong>{{ field.key }}:</strong>
              </td>
              <td>{{ field.value }}</td>
            </tr>
          </table>

          <div *ngIf="b.showActions" class="action-buttons">
            <button class="accept-btn" (click)="acceptProduct(i)">Accept</button>
            <button class="cancel-btn" (click)="cancelProduct()">Cancel</button>
          </div>

          <div *ngIf="!b.showActions" class="action-buttons">
            <button class="add-product-btn" (click)="addProduct()">Add Product</button>
          </div>
        </div>

        <!-- button after first welcome message-->
        <div *ngIf="i === 0 && b.from === 'bot'" class="action-buttons">
          <button class="action-btn" (click)="addProductFromImage()">
            Add a new Product from Image
          </button>
        </div>
      </div>
    </div>

    <!-- footer -->
    <form class="ftr" (submit)="send($event)">
      <button class="icon-btn" type="button" title="Add an image" (click)="fileInput.click()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
          <path
            d="M16.5 6v11.5c0 2.21-1.79 4-4 4s-4-1.79-4-4V5c0-1.38 1.12-2.5 2.5-2.5s2.5 1.12 2.5 2.5v10.5c0 .55-.45 1-1 1s-1-.45-1-1V6H10v9.5c0 1.38 1.12 2.5 2.5 2.5s2.5-1.12 2.5-2.5V5c0-2.21-1.79-4-4-4S7 2.79 7 5v12.5c0 3.04 2.46 5.5 5.5 5.5s5.5-2.46 5.5-5.5V6h-1.5z"
          />
        </svg>
      </button>
      <input
        #fileInput
        type="file"
        accept="image/*"
        style="display: none"
        (change)="onFileSelected($event)"
      />
      <input
        class="input"
        [(ngModel)]="draft"
        name="draft"
        placeholder="Type a message..."
        autocomplete="off"
      />
      <button class="btn" type="submit">
        <svg width="18" height="18" viewBox="0 0 512 512" fill="currentColor">
          <path
            d="M498.1 5.6c10.1 7 15.4 19.1 13.5 31.2l-64 416c-1.5 9.7-7.4 18.2-16 23s-18.9 5.4-28 1.6L284 427.7l-68.5 74.1c-8.9 9.7-22.9 12.9-35.2 8.1S160 493.2 160 480V396.4c0-4 1.5-7.8 4.2-10.7L331.8 202.8c5.8-6.3 5.6-16-.4-22s-15.7-6.4-22-.7L106 360.8 17.7 316.6C7.1 311.3 .3 300.7 0 288.9s5.9-22.8 16.1-28.7l448-256c10.7-6.1 23.9-5.5 34 1.4z"
          />
        </svg>
      </button>
    </form>
  </div>
</ng-container>

<ng-template #launcher>
  <button class="btn" (click)="openChat()">
    <svg class="chat-icon" viewBox="0 0 24 24">
      <path
        d="M20 2H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h4l4 4 4-4h4c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-2 12H6v-2h12v2zm0-3H6V9h12v2zm0-3H6V6h12v2z"
      />
    </svg>
    {{ launcherText }}
  </button>
</ng-template>
